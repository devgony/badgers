name: coverage

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: write
  checks: write
  pages: write
  pull-requests: write

concurrency:
  group: badgers-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install coverage.py
        run: pip install coverage

      - uses: ./
        with:
          cli-version: latest
          working-directory: examples/python-sample
          coverage-command: python -m coverage run -m unittest discover
          github-storage-repo: devgony/badgers
          github-storage-retention: latest
          fail-on-uncovered: true
          markdown-summary: true
          pages: true
